name: Databricks Asset Bundles CI

# This workflow validates and deploys Databricks Asset Bundles.
# To use it, configure the following repository secrets:
#   DATABRICKS_HOST: Your workspace URL (e.g. https://your-workspace.cloud.databricks.com)
#   DATABRICKS_TOKEN: A personal access token for authentication

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

      - name: Configure Databricks CLI authentication
        run: |
          echo "[DEFAULT]" > ~/.databrickscfg
          echo "host = ${{ secrets.DATABRICKS_HOST }}" >> ~/.databrickscfg
          echo "token = ${{ secrets.DATABRICKS_TOKEN }}" >> ~/.databrickscfg

      - name: Validate bundle
        run: databricks bundle validate

      - name: Deploy bundle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: databricks bundle deploy

      - name: Cleanup PR deployment
        if: github.event_name == 'pull_request'
        run: |
          databricks bundle destroy || true
