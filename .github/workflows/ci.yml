name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run linting
        run: poetry run python -m py_compile src/dbxredact/*.py

      - name: Run unit tests with coverage
        run: poetry run pytest tests/ -x -q --ignore=tests/integration --cov=dbxredact --cov-report=term-missing --cov-fail-under=30

      - name: Build wheel
        run: poetry build
