resources:
  jobs:
    redaction_benchmark:
      name: "[${bundle.target}] dbxredact - Redaction Benchmark"
      tasks:
        - task_key: run_detection
          notebook_task:
            notebook_path: ../notebooks/1_benchmarking_detection.py
            base_parameters:
              source_table: ${var.catalog}.${var.schema}.jsl_benchmark_source
              output_table: ${var.catalog}.${var.schema}.jsl_benchmark_detection_results
              endpoint: databricks-gpt-oss-120b
          new_cluster:
            spark_version: "17.3.x-scala2.13"
            kind: CLASSIC_PREVIEW
            use_ml_runtime: true
            node_type_id: "i3.xlarge"
            num_workers: 2
            data_security_mode: SINGLE_USER
          libraries:
            - whl: ../dist/dbxredact-${var.package_version}-py3-none-any.whl

        - task_key: run_evaluation
          depends_on:
            - task_key: run_detection
          notebook_task:
            notebook_path: ../notebooks/2_benchmarking_evaluation.py
            base_parameters:
              ground_truth_table: ${var.catalog}.${var.schema}.jsl_benchmark_ground_truth
              detection_results_table: ${var.catalog}.${var.schema}.jsl_benchmark_detection_results
              evaluation_output_table: ${var.catalog}.${var.schema}.phi_evaluation_results
          new_cluster:
            spark_version: "17.3.x-scala2.13"
            kind: CLASSIC_PREVIEW
            use_ml_runtime: true
            node_type_id: "i3.xlarge"
            num_workers: 2
            data_security_mode: SINGLE_USER
          libraries:
            - whl: ../dist/dbxredact-${var.package_version}-py3-none-any.whl

    redaction_pipeline:
      name: "[${bundle.target}] dbxredact - Redaction Pipeline"
      tasks:
        - task_key: run_redaction
          notebook_task:
            notebook_path: ../notebooks/4_redaction_pipeline.py
            base_parameters:
              source_table: ""
              text_column: ""
              output_table: ""
              doc_id_column: ""
              use_presidio: "true"
              use_ai_query: "true"
              use_gliner: "true"
              redaction_strategy: "generic"
              endpoint: "databricks-gpt-oss-120b"
              score_threshold: "0.5"
              refresh_approach: "full"
              output_strategy: "production"
              max_rows: ${var.max_rows}
          new_cluster:
            spark_version: "17.3.x-scala2.13"
            kind: CLASSIC_PREVIEW
            use_ml_runtime: true
            node_type_id: "i3.xlarge"
            num_workers: 1
            data_security_mode: SINGLE_USER
          libraries:
            - whl: ../dist/dbxredact-${var.package_version}-py3-none-any.whl
